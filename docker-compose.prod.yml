services:
  node:
    build: ./api/node
    ports:
      - "8000:8000"
    environment:
      - PYTHON_SERVICE_URL=http://python:5000
      - MONGODB_URI=mongodb://mongo:27017/solaris
    depends_on:
      - mongo
      - python

  python:
    build: ./api/python
    ports:
      - "5000:5000"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - node
      - frontend

volumes:
  mongo_data:
