services:
  node:
    build: ./api/node
    ports:
      - "8001:8000"
    volumes:
      - ./api/node:/app
    environment:
      - PYTHON_SERVICE_URL=http://python:5000
    command: npm start

  python:
    build: ./api/python
    ports:
      - "5000:5000"
    volumes:
      - ./api/python:/app
    command: uvicorn main:app --host 0.0.0.0 --port 5000

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://node:8000
    command: npm run dev -- --host
    depends_on:
      - node
